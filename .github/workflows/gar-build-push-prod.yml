# Build backend + frontend Docker images, push to Google Artifact Registry, then deploy to Cloud Run.
# ENVIRONMENT: PROD  (satorus-sidney project)
# Triggers on push to the "main" branch.
#
# Auth: Workload Identity Federation (OIDC) — no JSON keys in GitHub secrets.
# Docker push: use oauth2accesstoken + docker/login-action (not gcloud auth configure-docker),
# which avoids gcloud.docker-helper "getAccessToken" / impersonation failures with WIF.
#
# Build cache: Docker Buildx + GitHub Actions cache (type=gha).
# - Separate cache scopes from staging so prod builds never share staging layers.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
#   GCP_WORKLOAD_IDENTITY_PROVIDER_PROD — WIF provider resource name (satorus-sidney)
#   GCP_SERVICE_ACCOUNT_EMAIL_PROD      — CI SA email (gh-actions-gar@satorus-sidney.iam.gserviceaccount.com)
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
#   VITE_API_URL_PROD — prod backend HTTPS URL (https://ai-sidney-backend-prod-qxi7ucmxoa-nw.a.run.app)
#   + all other VITE_* build-time vars (VITE_FIREBASE_*, VITE_MAPBOX_*, etc.)
#
# Optional Variables (defaults match Terraform prod names):
#   CLOUD_RUN_BACKEND_SERVICE_PROD  — default: ai-sidney-backend-prod
#   CLOUD_RUN_FRONTEND_SERVICE_PROD — default: ai-sidney-frontend-prod

name: "Prod: Build, push, and deploy to Cloud Run"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gar-prod-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: satorus-sidney
  REGION: europe-west2
  # GAR repo IDs — prod uses environment-suffixed names to avoid 409 collision with staging repos
  GAR_BACKEND: ai-sidney-backend-prod
  GAR_BACKEND_IMAGE: backend
  GAR_FRONTEND: ai-sidney-frontend-prod
  GAR_FRONTEND_IMAGE: frontend
  # Cloud Run service names (override via repo Variables if renamed)
  CLOUD_RUN_BACKEND_SERVICE: ${{ vars.CLOUD_RUN_BACKEND_SERVICE_PROD || 'ai-sidney-backend-prod' }}
  CLOUD_RUN_FRONTEND_SERVICE: ${{ vars.CLOUD_RUN_FRONTEND_SERVICE_PROD || 'ai-sidney-frontend-prod' }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (12-char SHA)
        run: echo "TAG=${GITHUB_SHA:0:12}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (prod)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL_PROD }}
          # Access token for docker/login-action; also sets GOOGLE_OAUTH_ACCESS_TOKEN for gcloud deploy.
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform
          access_token_lifetime: 3600s

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Prefer login-action over "gcloud auth configure-docker" — the docker credential helper often
      # hits iam.serviceAccounts.getAccessToken / impersonation errors with WIF.
      - name: Log in to Artifact Registry (Docker)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_BACKEND }}/${{ env.GAR_BACKEND_IMAGE }}:${{ env.TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_BACKEND }}/${{ env.GAR_BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend-gar-prod
          cache-to: type=gha,mode=min,scope=backend-gar-prod
          provenance: false

      - name: Record backend image for deploy
        run: |
          echo "BACKEND_IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_BACKEND}/${GAR_BACKEND_IMAGE}:${TAG}" >> "$GITHUB_ENV"

      - name: Check VITE_API_URL_PROD (required for frontend build)
        env:
          VITE_API_URL_PROD: ${{ vars.VITE_API_URL_PROD }}
        run: |
          if [ -z "${VITE_API_URL_PROD:-}" ]; then
            echo "::error::Set repository variable VITE_API_URL_PROD (Settings → Variables) to the prod backend URL."
            exit 1
          fi

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL_PROD }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_MAPBOX_API_KEY=${{ secrets.VITE_MAPBOX_API_KEY }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
            VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
            VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
            VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
            VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
            VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
            VITE_SATORUS_TENANT_ID=${{ secrets.VITE_SATORUS_TENANT_ID }}
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_FRONTEND }}/${{ env.GAR_FRONTEND_IMAGE }}:${{ env.TAG }}
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_FRONTEND }}/${{ env.GAR_FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend-gar-prod
          cache-to: type=gha,mode=min,scope=frontend-gar-prod
          provenance: false

      - name: Record frontend image for deploy
        run: |
          echo "FRONTEND_IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_FRONTEND}/${GAR_FRONTEND_IMAGE}:${TAG}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run (prod)
        run: |
          set -euo pipefail
          echo "Deploying backend → ${CLOUD_RUN_BACKEND_SERVICE} (${PROJECT_ID})"
          gcloud run services update "${CLOUD_RUN_BACKEND_SERVICE}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --image="${BACKEND_IMAGE}"
          echo "Deploying frontend → ${CLOUD_RUN_FRONTEND_SERVICE} (${PROJECT_ID})"
          gcloud run services update "${CLOUD_RUN_FRONTEND_SERVICE}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --image="${FRONTEND_IMAGE}" \
            --port=8080

      - name: Summary
        run: |
          echo "### Prod deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend:  \`${BACKEND_IMAGE}\`"  >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: \`${FRONTEND_IMAGE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Services: \`${CLOUD_RUN_BACKEND_SERVICE}\` + \`${CLOUD_RUN_FRONTEND_SERVICE}\` in \`${REGION}\`" >> "$GITHUB_STEP_SUMMARY"

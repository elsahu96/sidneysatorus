# Build and deploy backend to Cloud Run.
# From repo root: gcloud builds submit --config deploy/cloudbuild-backend.yaml .

substitutions:
  _REGION: europe-west2
  _SERVICE: ai-sidney-backend-staging
  _CLOUDSQL_INSTANCE: satorus-sidney-dev:europe-west2:ai-sidney-postgres

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:${SHORT_SHA}
      - -f
      - backend/Dockerfile
      - backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:${SHORT_SHA}
    waitFor: ["-"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --add-cloudsql-instances
      - ${_CLOUDSQL_INSTANCE}
      - --update-secrets
      - DATABASE_URL=DATABASE_URL:latest
    waitFor: ["-"]

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:${SHORT_SHA}

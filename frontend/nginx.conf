server {
    # Cloud Run always injects PORT=8080 and health-checks on this port.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available (Vite generates .gz/.br files).
    gzip_static on;

    # SPA catch-all: any path that doesn't match a file falls back to index.html
    # so that client-side routing (React Router / Vue Router) works correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite includes content hash in filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable access logs for health-check probes to reduce noise.
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
